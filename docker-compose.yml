services:
  # ============================================================
  # MySQL 8.0 — 关系数据
  # ============================================================
  mysql:
    image: mysql:8.0
    container_name: ai-center-mysql
    restart: unless-stopped
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: ai_center
    volumes:
      - mysqldata:/var/lib/mysql
      - ./ai-center-server/src/main/resources/db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ============================================================
  # Redis 7 — 缓存 + 短期记忆
  # ============================================================
  redis:
    image: redis:7-alpine
    container_name: ai-center-redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  mysqldata:
  redisdata:
