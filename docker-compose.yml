services:
  # ============================================================
  # PostgreSQL 16 + pgvector — 关系数据 + 向量存储
  # ============================================================
  postgres:
    image: pgvector/pgvector:pg16
    container_name: ai-center-postgres
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: ai_center
      POSTGRES_USER: aicenter
      POSTGRES_PASSWORD: aicenter123
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./ai-center-server/src/main/resources/db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aicenter -d ai_center"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ============================================================
  # Redis 7 — 缓存 + 短期记忆
  # ============================================================
  redis:
    image: redis:7-alpine
    container_name: ai-center-redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ============================================================
  # Ollama — 本地 Embedding 模型 (bge-m3)
  # ============================================================
  ollama:
    image: ollama/ollama:latest
    container_name: ai-center-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollamadata:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "ollama list || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

volumes:
  pgdata:
  redisdata:
  ollamadata:
