services:
  # ============================================================
  # MySQL 8.0 — 关系数据
  # ============================================================
  mysql:
    image: mysql:8.0
    container_name: ai-center-mysql
    restart: unless-stopped
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: ai_center
    volumes:
      - mysqldata:/var/lib/mysql
      - ./ai-center-server/src/main/resources/db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ============================================================
  # Redis 7 — 缓存 + 短期记忆
  # ============================================================
  redis:
    image: redis:7-alpine
    container_name: ai-center-redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ============================================================
  # Ollama — 本地 Embedding 模型 (bge-m3)
  # 首次启动后自动拉取: docker exec ai-center-ollama ollama pull bge-m3
  # ============================================================
  ollama:
    image: ollama/ollama:latest
    container_name: ai-center-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollamadata:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "ollama list || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

volumes:
  mysqldata:
  redisdata:
  ollamadata:
