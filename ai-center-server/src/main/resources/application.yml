server:
  port: 8080

spring:
  application:
    name: ai-center

  profiles:
    active: dev

  jackson:
    default-property-inclusion: non_null
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai

  # PostgreSQL + pgvector 数据源
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://${PG_HOST:localhost}:${PG_PORT:5433}/ai_center
    username: ${PG_USER:aicenter}
    password: ${PG_PASSWORD:aicenter123}

  # Redis
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6380}
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

# MyBatis-Plus
mybatis-plus:
  type-aliases-package: com.aicenter.model.entity
  mapper-locations: classpath*:/mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# Knife4j
knife4j:
  enable: true
  setting:
    language: zh_cn

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

# ============================================================
# AI 配置
# ============================================================
ai:
  # LLM: DeepSeek v4 (OpenAI 兼容 API)
  llm:
    api-key: ${AI_LLM_API_KEY:your-api-key-here}
    base-url: https://api.deepseek.com/v1
    model: deepseek-v4-flash
    temperature: 0.1
    max-tokens: 4096

  # Embedding: Ollama bge-m3 (本地，1024 维)
  ollama:
    base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
    embedding-model: bge-m3

  # Pinecone 向量数据库
  pinecone:
    api-key: ${PINECONE_API_KEY:your-pinecone-api-key}
    environment: ${PINECONE_ENVIRONMENT:gcp-starter}
    project-id: ${PINECONE_PROJECT_ID:your-project-id}
    index: ${PINECONE_INDEX:ai-center}

  # 记忆配置
  memory:
    short-term:
      window-size: 20
      summary-threshold: 10
      redis-ttl-hours: 168
    long-term:
      top-k: 5
      similarity-threshold: 0.7

  # RAG
  rag:
    chunk-size: 500
    chunk-overlap: 50
    hybrid-weight-bm25: 0.3
    hybrid-weight-vector: 0.7
    rerank-top-k: 5
