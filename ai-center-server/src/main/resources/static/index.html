<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeAware - AI 智能问答</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/element-plus/dist/index.css">
    <script src="https://unpkg.com/element-plus"></script>
    <script src="https://unpkg.com/@element-plus/icons-vue"></script>
    <link href="https://unpkg.com/@element-plus/icons-vue/dist/index.css" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body,html,#app{height:100vh;overflow:hidden;font-family:"Helvetica Neue",Helvetica,"PingFang SC","Microsoft YaHei",sans-serif}
        .layout{display:flex;height:100vh}
        /* 左侧栏 */
        .sidebar{width:280px;background:#f7f8fa;border-right:1px solid #e5e6eb;display:flex;flex-direction:column}
        .sidebar-header{padding:16px;border-bottom:1px solid #e5e6eb}
        .sidebar-header h2{font-size:18px;color:#1d2129;margin-bottom:12px;display:flex;align-items:center;gap:8px}
        .sidebar-header h2 span{background:linear-gradient(135deg,#6366f1,#8b5cf6);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
        .conv-list{flex:1;overflow-y:auto;padding:8px}
        .conv-item{padding:12px;border-radius:8px;cursor:pointer;margin-bottom:4px;transition:all .2s;display:flex;justify-content:space-between;align-items:center}
        .conv-item:hover{background:#e8e9ed}
        .conv-item.active{background:#e0e7ff;border:1px solid #a5b4fc}
        .conv-item .title{font-size:14px;color:#1d2129;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
        .conv-item .del{visibility:hidden;cursor:pointer;color:#c0c4cc;font-size:14px}
        .conv-item:hover .del{visibility:visible}
        .conv-item .del:hover{color:#f56c6c}
        /* 主区域 */
        .main{flex:1;display:flex;flex-direction:column;background:#fff}
        .main-header{padding:12px 24px;border-bottom:1px solid #e5e6eb;display:flex;align-items:center;justify-content:space-between}
        .main-header .nav-links a{color:#6366f1;text-decoration:none;font-size:13px;margin-left:16px}
        .messages{flex:1;overflow-y:auto;padding:24px 20%;scroll-behavior:smooth}
        .msg-row{display:flex;margin-bottom:20px}
        .msg-row.user{justify-content:flex-end}
        .msg-row.ai{justify-content:flex-start}
        .msg-bubble{max-width:80%;padding:12px 16px;border-radius:12px;font-size:14px;line-height:1.7;white-space:pre-wrap;word-break:break-word}
        .msg-row.user .msg-bubble{background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;border-bottom-right-radius:4px}
        .msg-row.ai .msg-bubble{background:#f2f3f5;color:#1d2129;border-bottom-left-radius:4px}
        .msg-row.ai.streaming .msg-bubble::after{content:'▊';animation:blink 1s infinite}
        @keyframes blink{50%{opacity:0}}
        .msg-time{font-size:11px;color:#c0c4cc;margin-top:4px;text-align:center}
        /* 输入区 */
        .input-area{padding:16px 20%;border-top:1px solid #e5e6eb;background:#fff}
        .input-row{display:flex;gap:12px;align-items:flex-end}
        .input-row .el-textarea__inner{border-radius:12px!important;padding:12px 16px!important;font-size:14px;line-height:1.6!important;resize:none}
        .send-btn{height:40px;width:44px;border-radius:12px}
        .tips{text-align:center;color:#c0c4cc;font-size:12px;margin-top:8px}
        /* 空状态 */
        .empty-chat{text-align:center;padding-top:150px}
        .empty-chat h3{font-size:28px;background:linear-gradient(135deg,#6366f1,#8b5cf6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:12px}
        .empty-chat p{color:#86909c;font-size:14px}
    </style>
</head>
<body>
<div id="app">
    <div class="layout">
        <!-- 左侧栏 -->
        <div class="sidebar">
            <div class="sidebar-header">
                <h2><span>CodeAware</span> AI 助手</h2>
                <el-button type="primary" @click="newChat" style="width:100%;border-radius:10px">
                    <el-icon><Plus/></el-icon> 新对话
                </el-button>
            </div>
            <div class="conv-list">
                <div v-for="c in conversations" :key="c.sessionId"
                     :class="['conv-item', {active: c.sessionId === currentSession}]"
                     @click="switchConv(c)">
                    <span class="title">{{ c.title }}</span>
                    <span class="del" @click.stop="delConv(c)"><el-icon><Delete/></el-icon></span>
                </div>
                <div v-if="conversations.length===0" style="text-align:center;color:#c0c4cc;padding:40px 0;font-size:13px">
                    暂无对话记录
                </div>
            </div>
        </div>
        <!-- 主区域 -->
        <div class="main">
            <div class="main-header">
                <span style="font-size:15px;color:#4e5969">{{ currentTitle||'新对话' }}</span>
                <span class="nav-links"><a href="/knowledge.html">📚 知识库管理</a></span>
            </div>
            <!-- 消息区 -->
            <div class="messages" ref="msgContainer" v-if="messages.length>0">
                <div v-for="(m,i) in messages" :key="i" :class="['msg-row', m.role.toLowerCase()]">
                    <div>
                        <div class="msg-bubble">{{ m.content }}</div>
                    </div>
                </div>
            </div>
            <div class="empty-chat" v-else>
                <h3>CodeAware AI</h3>
                <p>AI 驱动的代码质量与知识管理助手</p>
                <p style="margin-top:8px">试试问：什么是 RAG？ | Spring Boot 自动配置原理？</p>
            </div>
            <!-- 输入区 -->
            <div class="input-area">
                <div class="input-row">
                    <el-input v-model="inputText" type="textarea" :rows="1" placeholder="输入你的问题，Enter 发送，Shift+Enter 换行"
                              @keydown.enter.exact.prevent="send" :disabled="sending"
                              style="flex:1" resize="none"/>
                    <el-button type="primary" @click="send" :loading="sending" class="send-btn">
                        <el-icon v-if="!sending"><Promotion/></el-icon>
                    </el-button>
                </div>
                <div class="tips">基于 DeepSeek V4 + RAG 知识库 | Enter 发送 · Shift+Enter 换行</div>
            </div>
        </div>
    </div>
</div>
<script>
const {createApp,ref,nextTick,onMounted}=Vue
createApp({
    setup(){
        const conversations=ref([])
        const messages=ref([])
        const currentSession=ref('')
        const currentTitle=ref('')
        const inputText=ref('')
        const sending=ref(false)
        const msgContainer=ref(null)

        async function loadConvs(){
            try{const r=await fetch('/api/chat/conversations');const d=await r.json()
                if(d.code===1)conversations.value=d.data}catch(e){}
        }
        function newChat(){currentSession.value='';currentTitle.value='';messages.value=[]}
        function switchConv(c){currentSession.value=c.sessionId;currentTitle.value=c.title;loadMsgs()}
        async function loadMsgs(){
            if(!currentSession.value)return
            try{const r=await fetch(`/api/chat/conversations/${currentSession.value}`);const d=await r.json()
                if(d.code===1)messages.value=d.data.map(m=>({role:m.role,content:m.content}))}catch(e){}
        }
        async function delConv(c){
            try{await fetch(`/api/chat/conversations/${c.sessionId}`,{method:'DELETE'})
                conversations.value=conversations.value.filter(x=>x.sessionId!==c.sessionId)
                if(c.sessionId===currentSession.value)newChat()}catch(e){}
        }
        function send(){
            const text=inputText.value.trim();if(!text||sending.value)return
            inputText.value='';sending.value=true
            messages.value.push({role:'USER',content:text})
            const sid=currentSession.value||''
            const aiMsg={role:'ASSISTANT',content:'',streaming:true}
            messages.value.push(aiMsg)

            // EventSource = 浏览器原生 SSE, 逐 token 到达立即显示
            const params=new URLSearchParams({message:text})
            if(sid)params.append('sessionId',sid)
            const es=new EventSource('/api/chat/send/stream?'+params.toString())

            es.addEventListener('message',e=>{
                if(e.data){aiMsg.content+=e.data;scrollBottom()}
            })
            es.addEventListener('done',e=>{
                aiMsg.streaming=false
                if(e.data&&!currentSession.value){
                    currentSession.value=e.data;loadConvs()
                }
                es.close();sending.value=false
            })
            es.onerror=()=>{
                es.close();sending.value=false
                if(!aiMsg.content)aiMsg.content='请求失败，请重试'
                aiMsg.streaming=false
            }
        }
        function scrollBottom(){nextTick(()=>{if(msgContainer.value)msgContainer.value.scrollTop=msgContainer.value.scrollHeight})}
        onMounted(loadConvs)
        return{conversations,messages,currentSession,currentTitle,inputText,sending,msgContainer,
                loadConvs,newChat,switchConv,delConv,send,scrollBottom}
    }
}).use(ElementPlus).mount('#app')
</script>
</body>
</html>
